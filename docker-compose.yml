services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mantecato
      POSTGRES_USER: mantecato
      POSTGRES_PASSWORD: mantecato
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mantecato"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    env_file:
      - .env
    environment:
      DEBUG: "False"
      DJANGO_SETTINGS_MODULE: mantecato.settings
      DATABASE_URL: postgres://mantecato:mantecato@db:5432/mantecato
    ports:
      - "8000:8000"
    volumes:
      - staticfiles:/app/staticfiles
      - geodata:/app/geo
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/', timeout=5)"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  pgdata:
  staticfiles:
  geodata:
