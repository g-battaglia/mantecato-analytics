# railway.toml — Mantecato (Django) — Railway config-as-code (2026)
# Docs: https://docs.railway.com/reference/config-as-code
"$schema" = "https://railway.com/railway.schema.json"

[build]
builder = "RAILPACK"
# Il Dockerfile di self-hosting è rinominato `Dockerfile.standalone` di proposito:
# Railway userebbe in automatico un file chiamato esattamente `Dockerfile`,
# scavalcando questo `builder = "RAILPACK"`. Con l'altro nome, Railpack ha effetto.
# Railpack rileva uv.lock + pyproject.toml + manage.py ed esegue `uv sync`.
# Non esegue collectstatic da solo: lo facciamo qui, sul sorgente completo.
buildCommand = "uv run python manage.py collectstatic --noinput"
watchPatterns = [
  "apps/**",
  "core/**",
  "cli/**",
  "mantecato/**",
  "static/**",
  "templates/**",
  "manage.py",
  "pyproject.toml",
  "uv.lock",
]

[deploy]
# preDeployCommand gira UNA volta, prima che la nuova versione riceva traffico.
# Ideale per: migrazioni + hook umami (inerte di default) + bootstrap admin opzionale.
# migrate qui (non nello startCommand) => nessuna race su repliche multiple e
# deploy atomico: se migrate fallisce, Railway non promuove la nuova versione.
preDeployCommand = "uv run python manage.py migrate --noinput && uv run python manage.py importumamienv && { if [ -n \"${INIT_ADMIN_PASS:-}\" ]; then uv run python manage.py createuser \"${INIT_ADMIN_USER:-admin}\" --role admin --password \"$INIT_ADMIN_PASS\" || true; fi; }"
# Railway inietta $PORT; gunicorn deve ascoltare su 0.0.0.0:$PORT.
startCommand = "uv run gunicorn mantecato.wsgi:application --bind 0.0.0.0:$PORT --workers ${GUNICORN_WORKERS:-2} --timeout ${GUNICORN_TIMEOUT:-120} --access-logfile - --error-logfile -"
# /health/ esegue SELECT 1 sul DB: timeout generoso per il primo boot del Postgres.
healthcheckPath = "/health/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
