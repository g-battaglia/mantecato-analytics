services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "${FRONTEND_PORT:-4180}:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "${BACKEND_PORT:-8100}:8100"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SESSION_SECRET=${SESSION_SECRET:?SESSION_SECRET must be set}
    restart: unless-stopped

  cli:
    build:
      context: .
      dockerfile: cli/Dockerfile
    profiles: ["cli"]
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - MANTECATO_API_KEY=${MANTECATO_API_KEY}
    entrypoint: ["mantecato"]

  mcp:
    build:
      context: .
      dockerfile: mcp/Dockerfile
    profiles: ["mcp"]
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - MANTECATO_API_KEY=${MANTECATO_API_KEY}
    entrypoint: ["mantecato-mcp"]
    stdin_open: true
