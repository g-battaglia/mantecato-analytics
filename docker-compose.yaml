services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "${FRONTEND_PORT:-4180}:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    ports:
      - "${BACKEND_PORT:-8100}:8100"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SESSION_SECRET=${SESSION_SECRET:-mantecato-secret}
    restart: unless-stopped

  cli:
    build:
      context: .
      dockerfile: Dockerfile.cli
    profiles: ["cli"]
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - MANTECATO_API_KEY=${MANTECATO_API_KEY}
    entrypoint: ["npx", "tsx", "src/cli/index.ts"]
    working_dir: /app

  mcp:
    build:
      context: .
      dockerfile: Dockerfile.cli
    profiles: ["mcp"]
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - MANTECATO_API_KEY=${MANTECATO_API_KEY}
    entrypoint: ["npx", "tsx", "src/mcp/server.ts"]
    working_dir: /app
    stdin_open: true
