{% load i18n fmt %}
{% spaceless %}
<div class="space-y-0">
  {% for page in top_pages %}
  <a href="?{% for key, val in request.GET.items %}{{ key }}={{ val }}&{% endfor %}filter=url_path:eq:{{ page.urlPath }}"
     class="relative flex items-center rounded px-2.5 py-[6px] text-[12.5px] transition-colors hover:bg-muted/30">
    {% if top_pages.0.views %}
    <div class="absolute inset-y-0 left-0 rounded bg-primary/[0.08]" style="width: {% widthratio page.views top_pages.0.views 100 %}%"></div>
    {% endif %}
    <span class="relative flex-1 truncate font-mono text-foreground" title="{{ page.urlPath }}">{{ page.urlPath }}</span>
    <div class="relative flex gap-3 font-mono text-[12px]">
      <span class="text-muted-foreground">{{ page.visitors|intcomma }}</span>
      <span class="min-w-[50px] text-right text-foreground">{{ page.views|intcomma }}</span>
    </div>
  </a>
  {% empty %}
  <p class="py-4 text-center text-xs text-muted-foreground">{% trans "No page data" %}</p>
  {% endfor %}
</div>
{% endspaceless %}
