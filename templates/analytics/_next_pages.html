{% load i18n fmt %}
<div class="mt-2 rounded-lg border border-border bg-muted/30 p-4">
  <h3 class="mb-2 text-sm font-medium text-foreground">{% trans "Where do visitors go after" %} <code class="rounded bg-muted px-1.5 py-0.5 text-xs">{{ url_path }}</code></h3>
  {% for p in pages %}
  <div class="flex items-center justify-between py-1 text-sm">
    <span class="min-w-0 truncate font-mono text-foreground" title="{{ p.urlPath }}">{{ p.urlPath }}</span>
    <div class="ml-2 flex shrink-0 gap-3 tabular-nums">
      <span class="text-muted-foreground">{{ p.count|intcomma }}</span>
      <span class="w-12 text-right text-foreground">{{ p.percentage|floatformat:1 }}%</span>
    </div>
  </div>
  {% empty %}
  <p class="text-xs text-muted-foreground">{% trans "No navigation data — visitors exit from this page." %}</p>
  {% endfor %}
</div>
