{% load i18n fmt %}
{% spaceless %}
<div class="space-y-0">
  {% for ref in top_referrers %}
  <a href="?{% for key, val in request.GET.items %}{{ key }}={{ val }}&{% endfor %}filter=referrer_domain:eq:{{ ref.referrer }}"
     class="relative flex items-center rounded px-2.5 py-[6px] text-[12.5px] transition-colors hover:bg-muted/30">
    {% if top_referrers.0.pageviews %}
    <div class="absolute inset-y-0 left-0 rounded bg-primary/[0.08]" style="width: {% widthratio ref.pageviews top_referrers.0.pageviews 100 %}%"></div>
    {% endif %}
    <span class="relative flex-1 truncate text-foreground">{{ ref.referrer }}</span>
    <div class="relative flex gap-3 font-mono text-[12px]">
      <span class="text-muted-foreground">{{ ref.percentage|floatformat:1 }}%</span>
      <span class="min-w-[50px] text-right text-foreground">{{ ref.pageviews|intcomma }}</span>
    </div>
  </a>
  {% empty %}
  <p class="py-4 text-center text-xs text-muted-foreground">{% trans "No referrer data" %}</p>
  {% endfor %}
</div>
{% endspaceless %}
