{% load i18n fmt %}
<div class="mt-2 rounded-lg border border-border bg-muted/30 p-4">
  <h3 class="mb-2 text-sm font-medium text-foreground">{% trans "Time on page" %} <code class="rounded bg-muted px-1.5 py-0.5 text-xs">{{ url_path }}</code></h3>
  {% if distribution %}
  <div class="space-y-1">
    {% for d in distribution %}
    <div class="flex items-center gap-2 text-sm">
      <span class="w-16 shrink-0 text-right text-xs text-muted-foreground">{{ d.bucket }}</span>
      <div class="flex-1 h-5 rounded bg-muted/50 overflow-hidden">
        <div class="h-full rounded bg-indigo-500/70 transition-all" style="width: {{ d.pct|default:0 }}%"></div>
      </div>
      <span class="w-12 shrink-0 text-right tabular-nums text-foreground">{{ d.count }}</span>
    </div>
    {% endfor %}
  </div>
  {% else %}
  <p class="text-xs text-muted-foreground">{% trans "No time data for this page." %}</p>
  {% endif %}
</div>
