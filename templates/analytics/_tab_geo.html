{% load i18n fmt %}
{% spaceless %}
<div class="space-y-0">
  {% for c in country %}
  <a href="?{% for key, val in request.GET.items %}{{ key }}={{ val }}&{% endfor %}filter=country:eq:{{ c.country }}"
     class="relative flex items-center rounded px-2.5 py-[6px] text-[12.5px] transition-colors hover:bg-muted/30">
    {% if country.0.visitors %}
    <div class="absolute inset-y-0 left-0 rounded bg-primary/[0.08]" style="width: {% widthratio c.visitors country.0.visitors 100 %}%"></div>
    {% endif %}
    <span class="relative flex-1 truncate text-foreground">{{ c.country|default:"(unknown)" }}</span>
    <div class="relative flex gap-3 font-mono text-[12px]">
      <span class="text-muted-foreground">{{ c.pct|floatformat:1 }}%</span>
      <span class="min-w-[50px] text-right text-foreground">{{ c.visitors|intcomma }}</span>
    </div>
  </a>
  {% empty %}
  <p class="py-4 text-center text-xs text-muted-foreground">{% trans "No country data" %}</p>
  {% endfor %}
</div>
{% endspaceless %}
